name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
      - "improve-*"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JS dependencies
        run: bun install

      - name: Install LiteLLM
        run: python -m pip install --upgrade pip && python -m pip install "litellm[proxy]"

      - name: Create local gateway env for CI
        run: cp examples/provider-gateway/gateway.env.example examples/provider-gateway/gateway.env

      - name: Bash syntax checks
        run: |
          bash -n bootstrap-gateway.sh
          bash -n doctor-gateway
          bash -n run-claude.sh
          bash -n use-provider
          bash -n use-openai
          bash -n scripts/smoke-test-gateway.sh
          bash -n scripts/prepublish-check.sh
          bash -n examples/provider-gateway/start-litellm.sh
          bash -n examples/provider-gateway/run-claude.sh

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Smoke test gateway workflow
        run: ./scripts/smoke-test-gateway.sh --ci
